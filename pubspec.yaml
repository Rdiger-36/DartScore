name: dartscore_app
description: "Dart Score Tracker App"
publish_to: 'none'

version: 1.0.0+202600004

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  share_plus: ^13.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  image_picker: ^1.1.2
  gal: ^2.3.2
  path_provider: ^2.1.5
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.2
  in_app_purchase: ^3.2.0

dependency_overrides:
  path_provider_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
